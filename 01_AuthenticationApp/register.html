<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-md bg-gray-800 p-8 rounded-2xl shadow-xl">

    <h1 class="text-3xl font-bold text-center mb-8 font-mono">
      Register User
    </h1>

    <form id="registerForm" class="flex flex-col gap-4">

      <input
        type="email"
        name="email"
        placeholder="Email"
        required
        class="p-3 rounded-lg text-black"
      />

      <input
        type="password"
        name="password"
        placeholder="Password"
        required
        class="p-3 rounded-lg text-black"
      />

      <select
        name="role"
        required
        class="p-3 rounded-lg text-black"
      >
        <option value="">Select Role</option>
        <option value="ADMIN">ADMIN</option>
        <option value="USER">USER</option>
      </select>

      <input
        type="text"
        name="username"
        placeholder="Username"
        required
        class="p-3 rounded-lg text-black"
      />

      <button
        type="submit"
        class="bg-blue-500 hover:bg-blue-600 transition py-3 rounded-lg font-semibold"
      >
        Register
      </button>

      <p class="error text-red-500 text-sm"></p>
      <p class="success text-green-500 text-sm"></p>

    </form>

  </div>

  <script src="register.js"></script>
</body>
</html>
