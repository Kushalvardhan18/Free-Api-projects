<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-md bg-gray-800 rounded-2xl shadow-xl p-8">

    <h1 class="text-3xl font-bold text-center mb-8 font-mono">
      User Profile
    </h1>

    <div class="space-y-5">

      <div class="bg-gray-700 p-4 rounded-lg">
        <p class="text-gray-400 text-sm">Username</p>
        <h2 id="username" class="text-xl font-semibold"></h2>
      </div>

      <div class="bg-gray-700 p-4 rounded-lg">
        <p class="text-gray-400 text-sm">Email</p>
        <h2 id="email" class="text-xl font-semibold"></h2>
      </div>

      <div class="bg-gray-700 p-4 rounded-lg">
        <p class="text-gray-400 text-sm">Role</p>
        <h2 id="role" class="text-xl font-semibold"></h2>
      </div>

    </div>

    <button
      id="logoutBtn"
      class="w-full mt-8 bg-red-500 hover:bg-red-600 transition py-3 rounded-lg font-semibold"
    >
      Logout
    </button>

  </div>

  <script src="dashboard.js"></script>
</body>
</html>
